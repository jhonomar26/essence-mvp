services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: essence_mvp
      POSTGRES_USER: essence
      POSTGRES_PASSWORD: essence_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/essence_mvp_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  postgres_data:
